<div id="validation-screen" style="display:none;">
    <h2>Panel de Validación</h2>
    <div id="results-table" style="display: flex; gap: 15px; justify-content: center;"></div>
    <button onclick="nextRound()" style="margin-top:20px; padding:15px;">Siguiente Ronda</button>
</div>

<script>
socket.on('show-validation', (allPlayers) => {
    document.getElementById('status').style.display = 'none';
    const container = document.getElementById('results-table');
    container.parentElement.style.display = 'block';
    
    renderValidation(allPlayers);
});

function renderValidation(allPlayers) {
    const container = document.getElementById('results-table');
    container.innerHTML = Object.entries(allPlayers).map(([id, p]) => `
        <div class="player-card">
            <h3>${p.name}</h3>
            <div class="word-row">
                Nombre: ${p.answers.nombre} (${p.pointsDetail.nombre}pts)
                <button onclick="invalidate('${id}', 'nombre')">❌</button>
            </div>
            <div class="word-row">
                Color: ${p.answers.color} (${p.pointsDetail.color}pts)
                <button onclick="invalidate('${id}', 'color')">❌</button>
            </div>
            <div class="word-row">
                Fruto: ${p.answers.fruto} (${p.pointsDetail.fruto}pts)
                <button onclick="invalidate('${id}', 'fruto')">❌</button>
            </div>
        </div>
    `).join('');
}

function invalidate(playerId, category) {
    socket.emit('invalidate-word', { playerId, category });
}
</script>
