<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Basta TV</title>
<script src="/socket.io/socket.io.js"></script>

<style>

body {
    font-family: Arial;
    background:#111;
    color:white;
    text-align:center;
}

button {
    padding:8px 16px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.hidden { display:none; }

/* =======================
   Selector bloqueado
======================= */
#round-selector-container.locked {
    opacity:0.5;
    pointer-events:none;
    transition:0.4s;
}

/* =======================
   Barra progreso
======================= */
#progress-container {
    width:80%;
    margin:10px auto;
    background:#333;
    height:18px;
    border-radius:10px;
    overflow:hidden;
}

#progress-bar {
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#60a5fa,#3b82f6);
    transition:0.4s;
}

/* =======================
   Badge
======================= */
.badge {
    background:#22c55e;
    padding:6px 14px;
    border-radius:20px;
    display:inline-block;
    margin:10px;
    animation:pulse 1.5s infinite;
}

@keyframes pulse {
    0% { box-shadow:0 0 0px #22c55e; }
    50% { box-shadow:0 0 15px #22c55e; }
    100% { box-shadow:0 0 0px #22c55e; }
}

/* =======================
   PODIO
======================= */

#podium-overlay {
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.9);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:999;
}

.podium {
    display:flex;
    gap:30px;
    align-items:flex-end;
}

.place {
    display:flex;
    flex-direction:column;
    align-items:center;
}

.box {
    width:100px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-weight:bold;
    border-radius:8px 8px 0 0;
}

.first .box {
    height:160px;
    background:gold;
    box-shadow:0 0 25px gold;
}

.second .box { height:120px; background:silver; }
.third .box { height:90px; background:#cd7f32; }

.crown {
    font-size:40px;
    animation:crownBounce 1.2s infinite alternate;
}

@keyframes crownBounce {
    from { transform:translateY(0px) rotate(-5deg); }
    to { transform:translateY(-8px) rotate(5deg); }
}

</style>
</head>
<body>

<h1>Basta</h1>

<input id="name" placeholder="Nombre">
<button onclick="join()">Unirse</button>

<div id="players"></div>

<div id="round-selector-container">
    <label>Rondas: <span id="lock-icon">🔓</span></label>
    <select id="round-selector">
        <option value="5">5</option>
        <option value="10" selected>10</option>
        <option value="15">15</option>
        <option value="20">20</option>
    </select>
</div>

<button id="start-button" onclick="startGame()">Iniciar Juego</button>

<div id="badge" class="badge hidden">🎮 SET EN CURSO</div>

<h2 id="round-info"></h2>
<h1 id="letter"></h1>

<div id="progress-container">
    <div id="progress-bar"></div>
</div>

<!-- PODIO OCULTO POR DEFECTO -->
<div id="podium-overlay" class="hidden">
    <div>
        <h1>🏆 RESULTADOS</h1>

        <div class="podium">

            <div class="place second">
                <div id="second-name"></div>
                <div id="second-score"></div>
                <div class="box">2°</div>
            </div>

            <div class="place first">
                <div class="crown">👑</div>
                <div id="first-name"></div>
                <div id="first-score"></div>
                <div class="box">1°</div>
            </div>

            <div class="place third">
                <div id="third-name"></div>
                <div id="third-score"></div>
                <div class="box">3°</div>
            </div>

        </div>

        <button onclick="closePodium()">Cerrar</button>
    </div>
</div>

<script>

const socket = io();

/* Seguridad: siempre ocultar podio al cargar */
window.onload = () => {
    document.getElementById("podium-overlay")
        .classList.add("hidden");
};

function join(){
    const name = document.getElementById("name").value;
    socket.emit("join-game", name);
}

function startGame(){

    const rounds =
        parseInt(document.getElementById("round-selector").value);

    document.getElementById("round-selector-container")
        .classList.add("locked");

    document.getElementById("round-selector").disabled = true;
    document.getElementById("start-button").disabled = true;
    document.getElementById("lock-icon").innerText="🔒";
    document.getElementById("badge").classList.remove("hidden");

    socket.emit("start-game",{rounds});
}

socket.on("new-round", data=>{
    document.getElementById("round-info").innerText =
        `Ronda ${data.round} / ${data.totalRounds}`;

    document.getElementById("letter").innerText =
        data.letter;

    const percent =
        (data.round / data.totalRounds)*100;

    document.getElementById("progress-bar")
        .style.width = percent+"%";
});

socket.on("game-over", data=>{

    const sorted =
        data.players.sort((a,b)=>b.totalScore-a.totalScore);

    if(sorted[0]){
        document.getElementById("first-name").innerText =
            sorted[0].name;
        document.getElementById("first-score").innerText =
            sorted[0].totalScore+" pts";
    }
    if(sorted[1]){
        document.getElementById("second-name").innerText =
            sorted[1].name;
        document.getElementById("second-score").innerText =
            sorted[1].totalScore+" pts";
    }
    if(sorted[2]){
        document.getElementById("third-name").innerText =
            sorted[2].name;
        document.getElementById("third-score").innerText =
            sorted[2].totalScore+" pts";
    }

    document.getElementById("podium-overlay")
        .classList.remove("hidden");
});

function closePodium(){

    document.getElementById("podium-overlay")
        .classList.add("hidden");

    document.getElementById("round-selector-container")
        .classList.remove("locked");

    document.getElementById("round-selector").disabled = false;
    document.getElementById("start-button").disabled = false;
    document.getElementById("lock-icon").innerText="🔓";
    document.getElementById("badge").classList.add("hidden");
    document.getElementById("progress-bar").style.width="0%";
}

</script>

</body>
</html>
