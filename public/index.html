<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Basta Multiplayer</title>
</head>
<body>
  <h1>Basta</h1>

  <input id="nameInput" placeholder="Tu nombre" />
  <button onclick="joinGame()">Entrar</button>

  <h2>Letra actual: <span id="letter">-</span></h2>

  <button onclick="startGame()">Iniciar Juego</button>
  <button onclick="nextLetter()">Siguiente Letra</button>

  <h3>Jugadores</h3>
  <ul id="players"></ul>

  <script src="/socket.io/socket.io.js"></script>
  <script src="client.js"></script>
</body>
</html>
