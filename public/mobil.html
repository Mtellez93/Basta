<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basta - Jugador</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        input { display: block; width: 100%; margin-bottom: 10px; padding: 10px; box-sizing: border-box; }
        #game-form { display: none; }
    </style>
</head>
<body>
    <div id="login">
        <input type="text" id="playerName" placeholder="Tu nombre">
        <button onclick="join()">CONECTAR</button>
    </div>

    <div id="game-form">
        <h2 id="letraDisplay"></h2>
        <input type="text" id="nombre" placeholder="Nombre">
        <input type="text" id="color" placeholder="Color">
        <input type="text" id="fruto" placeholder="Fruto/Flor">
        <button onclick="basta()" style="background: red; color: white; padding: 20px; width: 100%;">¡BASTA!</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        function join() {
            const name = document.getElementById('playerName').value;
            if(name) {
                socket.emit('join-game', name);
                document.getElementById('login').innerHTML = "<h3>Conectado. Espera a que la TV inicie...</h3>";
            }
        }

        socket.on('game-started', (letter) => {
            document.getElementById('login').style.display = 'none';
            document.getElementById('game-form').style.display = 'block';
            document.getElementById('letraDisplay').innerText = "LETRA: " + letter;
        });

        function basta() {
            const answers = {
                nombre: document.getElementById('nombre').value,
                color: document.getElementById('color').value,
                fruto: document.getElementById('fruto').value
            };
            socket.emit('basta', answers);
        }

        socket.on('stop-game', () => {
            document.getElementById('game-form').innerHTML = "<h3>¡TIEMPO! Validando en la TV...</h3>";
        });
    </script>
</body>
</html>
