<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Basta! Mando</title>
    <style>
        body { font-family: sans-serif; padding: 15px; background: #f1f5f9; margin: 0; }
        input { display: block; width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; margin-bottom: 10px; cursor: pointer; }
        .btn-join { background: #3b82f6; color: white; }
        .btn-basta { background: #ef4444; color: white; font-size: 1.2rem; }
        .btn-host { background: #10b981; color: white; }
        .btn-del { background: #f87171; color: white; padding: 4px 8px; width: auto; font-size: 10px; }
        .host-panel { background: #fff; border: 2px solid #10b981; padding: 10px; border-radius: 10px; margin-top: 10px; }
        .val-row { display: flex; justify-content: space-between; align-items: center; font-size: 12px; border-bottom: 1px solid #eee; padding: 4px 0; }
    </style>
</head>
<body>
    <div id="setup-view">
        <input type="text" id="player-name" placeholder="Nombre">
        <button class="btn-join" onclick="join()">CONECTAR</button>
        <div id="host-start" style="display:none;" class="host-panel">
            <button class="btn-host" onclick="socket.emit('start-game')">INICIAR PARTIDA</button>
        </div>
    </div>

    <div id="game-view" style="display:none;">
        <h2 id="letra" style="text-align:center;"></h2>
        <input type="text" id="nombre" placeholder="Nombre" autocomplete="off">
        <input type="text" id="apellido" placeholder="Apellido" autocomplete="off">
        <input type="text" id="animal" placeholder="Animal" autocomplete="off">
        <input type="text" id="ciudad" placeholder="Ciudad" autocomplete="off">
        <input type="text" id="color" placeholder="Color" autocomplete="off">
        <input type="text" id="fruto" placeholder="Fruto" autocomplete="off">
        <button class="btn-basta" onclick="basta()">¡BASTA!</button>
    </div>

    <div id="wait-view" style="display:none;">
        <h3 style="text-align:center;">Validando en TV...</h3>
        <div id="host-validation-panel" style="display:none;" class="host-panel">
            <p><b>Anular palabras:</b></p>
            <div id="validation-list"></div>
            <button class="btn-host" onclick="socket.emit('next-round-action')">SIGUIENTE RONDA</button>
        </div>
        <button id="btn-reset" class="btn-join" style="display:none; background:#6366f1;" onclick="socket.emit('reset-game')">NUEVA PARTIDA</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let soyHost = false;
        const cats = ['nombre','apellido','animal','ciudad','color','fruto'];

        socket.on('assign-role', (data) => { 
            soyHost = data.isHost; 
            if(soyHost && document.getElementById('player-name').style.display === 'none') document.getElementById('host-start').style.display = 'block';
        });

        function join() {
            const n = document.getElementById('player-name').value;
            if(!n) return;
            socket.emit('join-game', n);
            document.getElementById('player-name').style.display = 'none';
            document.querySelector('.btn-join').style.display = 'none';
            if(soyHost) document.getElementById('host-start').style.display = 'block';
        }

        socket.on('round-started', (data) => {
            document.getElementById('setup-view').style.display = 'none';
            document.getElementById('wait-view').style.display = 'none';
            document.getElementById('game-view').style.display = 'block';
            document.getElementById('letra').innerText = "LETRA: " + data.letter;
        });

        function basta() {
            let a = {}; cats.forEach(c => a[c] = document.getElementById(c).value);
            socket.emit('basta', a);
        }

        socket.on('force-submit', () => {
            let a = {}; cats.forEach(c => a[c] = document.getElementById(c).value);
            socket.emit('submit-final-answers', a);
            document.getElementById('game-view').style.display = 'none';
            document.getElementById('wait-view').style.display = 'block';
        });

        socket.on('show-validation', (players) => {
            if(!soyHost) return;
            document.getElementById('host-validation-panel').style.display = 'block';
            document.getElementById('validation-list').innerHTML = players.map(p => `
                <div style="border-top:1px solid #10b981; margin-top:5px;"><b>${p.name}</b></div>
                ${cats.map(c => `
                    <div class="val-row">
                        <span>${c}: ${p.answers[c]||'-'}</span>
                        <button class="btn-del" onclick="socket.emit('invalidate-word', {playerId:'${p.id}', category:'${c}'})">X</button>
                    </div>
                `).join('')}
            `).join('');
        });

        socket.on('game-over', () => {
            if(soyHost) document.getElementById('btn-reset').style.display = 'block';
        });

        socket.on('game-reset-complete', () => location.reload());
    </script>
</body>
</html>
