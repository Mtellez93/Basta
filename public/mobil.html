<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basta! Mando</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f8fafc; color: #1e293b; }
        input { display: block; width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #cbd5e1; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; font-size: 16px; cursor: pointer; }
        .btn-join { background: #3b82f6; color: white; }
        .btn-host { background: #10b981; color: white; margin-top: 15px; }
        .btn-basta { background: #ef4444; color: white; font-size: 20px; margin-top: 20px; }
        .cat-label { font-size: 12px; font-weight: bold; color: #64748b; text-transform: uppercase; margin-top: 5px; }
    </style>
</head>
<body>
    <div id="setup-view">
        <h2>Ingresar al Juego</h2>
        <input type="text" id="player-name" placeholder="Escribe tu nombre">
        <button class="btn-join" onclick="join()">CONECTAR</button>
        <div id="host-msg" style="display:none; color: #10b981; margin-top:10px;">Eres el Host. Espera a que todos entren.</div>
        <button id="start-btn" class="btn-host" style="display:none;" onclick="socket.emit('start-game')">INICIAR JUEGO</button>
    </div>

    <div id="game-view" style="display:none;">
        <h2 id="current-letter" style="text-align:center; color:#3b82f6;"></h2>
        <div class="cat-label">Nombre</div><input type="text" id="nombre">
        <div class="cat-label">Apellido</div><input type="text" id="apellido">
        <div class="cat-label">Animal</div><input type="text" id="animal">
        <div class="cat-label">Ciudad / País</div><input type="text" id="ciudad">
        <div class="cat-label">Color</div><input type="text" id="color">
        <div class="cat-label">Flor o Fruto</div><input type="text" id="fruto">
        <button class="btn-basta" onclick="enviarBasta()">¡BASTA!</button>
    </div>

    <div id="wait-view" style="display:none; text-align:center;">
        <h3>¡Tiempo agotado!</h3>
        <p>Mira la TV para la validación.</p>
        <div id="host-next" style="display:none;">
            <button class="btn-host" onclick="socket.emit('next-round-action')">SIGUIENTE RONDA</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let isHost = false;
        const cats = ['nombre', 'apellido', 'animal', 'ciudad', 'color', 'fruto'];

        socket.on('assign-role', (data) => { isHost = data.isHost; });

        function join() {
            const name = document.getElementById('player-name').value;
            if(!name) return;
            socket.emit('join-game', name);
            document.querySelector('#setup-view h2').innerText = "¡Conectado!";
            document.getElementById('player-name').style.display = 'none';
            document.querySelector('.btn-join').style.display = 'none';
            if(isHost) {
                document.getElementById('host-msg').style.display = 'block';
                document.getElementById('start-btn').style.display = 'block';
            }
        }

        socket.on('round-started', (data) => {
            document.getElementById('setup-view').style.display = 'none';
            document.getElementById('wait-view').style.display = 'none';
            document.getElementById('game-view').style.display = 'block';
            document.getElementById('current-letter').innerText = "LETRA: " + data.letter;
            cats.forEach(c => document.getElementById(c).value = "");
        });

        function enviarBasta() {
            let answers = {};
            cats.forEach(c => answers[c] = document.getElementById(c).value);
            socket.emit('basta', answers);
        }

        socket.on('force-submit', () => {
            let answers = {};
            cats.forEach(c => answers[c] = document.getElementById(c).value);
            socket.emit('submit-final-answers', answers);
            document.getElementById('game-view').style.display = 'none';
            document.getElementById('wait-view').style.display = 'block';
            if(isHost) document.getElementById('host-next').style.display = 'block';
        });

        socket.on('show-validation', () => {
            document.getElementById('game-view').style.display = 'none';
            document.getElementById('wait-view').style.display = 'block';
            if(isHost) document.getElementById('host-next').style.display = 'block';
        });
    </script>
</body>
</html>
