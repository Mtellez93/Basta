<div id="setup">
        <input type="text" id="name" placeholder="Escribe tu nombre">
        <button class="btn-join" onclick="join()">CONECTAR AL JUEGO</button>
    </div>

    <div id="host-controls" style="display:none; margin-top: 20px; padding: 15px; border: 2px dashed #4caf50;">
        <p>🌟 Eres el Administrador</p>
        <button class="btn-join" onclick="iniciarDesdeMovil()">INICIAR JUEGO PARA TODOS</button>
    </div>

    <script>
    // ... (variables de socket iguales)

    socket.on('assign-role', (data) => {
        if (data.isHost) {
            // No lo mostramos de inmediato, esperamos a que se registre
            window.isHost = true;
        }
    });

    function join() {
        const n = document.getElementById('name').value;
        if(n) {
            socket.emit('join-game', n);
            document.getElementById('setup').innerHTML = "<h3>✅ Conectado. Esperando inicio...</h3>";
            
            // Si es host, mostramos sus controles
            if (window.isHost) {
                document.getElementById('host-controls').style.display = 'block';
            }
        }
    }

    function iniciarDesdeMovil() {
        socket.emit('start-game');
    }

    socket.on('round-started', (data) => {
        document.getElementById('host-controls').style.display = 'none'; // Ocultar al jugar
        // ... (resto de lógica de limpieza de inputs)
    });
    
    // Al terminar ronda, el host podría tener el botón "Siguiente" también
    socket.on('show-validation', () => {
        if (window.isHost) {
            document.getElementById('host-controls').innerHTML = '<button class="btn-join" onclick="socket.emit(\'next-round-action\')">SIGUIENTE RONDA</button>';
            document.getElementById('host-controls').style.display = 'block';
        }
    });
</script>
