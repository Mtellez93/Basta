<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Basta! Mando</title>
    <style>
        body { font-family: system-ui, sans-serif; padding: 20px; background: #f1f5f9; color: #1e293b; margin: 0; }
        .container { max-width: 400px; margin: 0 auto; }
        input { display: block; width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #cbd5e1; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; font-size: 16px; cursor: pointer; }
        .btn-join { background: #3b82f6; color: white; }
        .btn-host { background: #10b981; color: white; margin-top: 15px; }
        .btn-basta { background: #ef4444; color: white; font-size: 20px; margin-top: 20px; box-shadow: 0 4px 0 #b91c1c; }
        .btn-basta:active { box-shadow: none; transform: translateY(4px); }
        .cat-label { font-size: 12px; font-weight: bold; color: #64748b; text-transform: uppercase; margin-top: 10px; }
        #host-controls { background: #dcfce7; padding: 15px; border-radius: 10px; border: 2px solid #10b981; margin-top: 20px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div id="setup-view">
            <h2 id="status-title">Unirse al Juego</h2>
            <div id="join-form">
                <input type="text" id="player-name" placeholder="Tu nombre o apodo">
                <button class="btn-join" onclick="join()">CONECTAR AL JUEGO</button>
            </div>
            
            <div id="host-controls" style="display:none;">
                <p style="color: #166534; font-weight: bold; margin: 0 0 10px 0;">🌟 Eres el Administrador</p>
                <button class="btn-host" onclick="socket.emit('start-game')">INICIAR PARTIDA</button>
            </div>
            
            <p id="wait-msg" style="display:none; text-align:center; color: #64748b;">Esperando a que el host inicie...</p>
        </div>

        <div id="game-view" style="display:none;">
            <h2 id="current-letter" style="text-align:center; color:#3b82f6; font-size: 2rem; margin: 10px 0;"></h2>
            <div class="cat-label">Nombre</div><input type="text" id="nombre" autocomplete="off">
            <div class="cat-label">Apellido</div><input type="text" id="apellido" autocomplete="off">
            <div class="cat-label">Animal</div><input type="text" id="animal" autocomplete="off">
            <div class="cat-label">Ciudad / País</div><input type="text" id="ciudad" autocomplete="off">
            <div class="cat-label">Color</div><input type="text" id="color" autocomplete="off">
            <div class="cat-label">Flor o Fruto</div><input type="text" id="fruto" autocomplete="off">
            <button class="btn-basta" onclick="enviarBasta()">¡BASTA!</button>
        </div>

        <div id="wait-view" style="display:none; text-align:center; margin-top: 50px;">
            <h3 id="wait-title">¡TIEMPO!</h3>
            <p>Revisen los resultados en la TV.</p>
            <div id="host-next" style="display:none; margin-top: 30px;">
                <button class="btn-host" onclick="socket.emit('next-round-action')">SIGUIENTE RONDA</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let soyHost = false;
        const cats = ['nombre', 'apellido', 'animal', 'ciudad', 'color', 'fruto'];

        // Escuchar asignación de rol
        socket.on('assign-role', (data) => { 
            soyHost = data.isHost;
            // Si ya estamos conectados, mostrar controles de host inmediatamente
            actualizarUIHost();
        });

        function join() {
            const name = document.getElementById('player-name').value;
            if(!name) { alert("Escribe tu nombre"); return; }
            
            socket.emit('join-game', name);
            
            // UI post-registro
            document.getElementById('status-title').innerText = "¡Listo, " + name + "!";
            document.getElementById('join-form').style.display = 'none';
            document.getElementById('wait-msg').style.display = 'block';
            actualizarUIHost();
        }

        function actualizarUIHost() {
            const joinFormHidden = document.getElementById('join-form').style.display === 'none';
            if(soyHost && joinFormHidden) {
                document.getElementById('host-controls').style.display = 'block';
                document.getElementById('wait-msg').style.display = 'none';
            }
        }

        socket.on('round-started', (data) => {
            document.getElementById('setup-view').style.display = 'none';
            document.getElementById('wait-view').style.display = 'none';
            document.getElementById('game-view').style.display = 'block';
            document.getElementById('current-letter').innerText = "LETRA: " + data.letter;
            // Limpiar inputs
            cats.forEach(c => document.getElementById(c).value = "");
        });

        function getAnswers() {
            let answers = {};
            cats.forEach(c => answers[c] = document.getElementById(c).value);
            return answers;
        }

        function enviarBasta() {
            socket.emit('basta', getAnswers());
        }

        socket.on('force-submit', () => {
            socket.emit('submit-final-answers', getAnswers());
            mostrarEspera();
        });

        socket.on('show-validation', () => {
            mostrarEspera();
        });

        function mostrarEspera() {
            document.getElementById('game-view').style.display = 'none';
            document.getElementById('setup-view').style.display = 'none';
            document.getElementById('wait-view').style.display = 'block';
            if(soyHost) {
                document.getElementById('host-next').style.display = 'block';
            }
        }
    </script>
</body>
</html>
